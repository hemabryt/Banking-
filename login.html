<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome back to FinBank</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-header">
    <i class="fas fa-fingerprint auth-icon"></i>
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>
  </div>

  <form id="loginForm">
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="loginEmail" placeholder="Email address" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="loginPassword" placeholder="Password" required>
    </div>

    <div class="checkbox-row">
      <label>
        <input type="checkbox" id="rememberMe"> Remember me
      </label>
    </div>

    <button type="submit" class="btn-primary btn-block">Sign In</button>
  </form>

  <div id="biometricSection" style="display:none; margin-top: 16px;">
    <button id="biometricBtn" class="btn-secondary btn-block">
      <i class="fas fa-fingerprint"></i> Use Biometric
    </button>
  </div>

  <p class="auth-alt">Don't have an account? <a href="signup.html">Create one</a></p>
</div>

<!-- Biometric overlay modal -->
<div id="biometricModal" class="modal">
  <div class="modal-content biometric-modal">
    <i class="fas fa-fingerprint fingerprint-icon"></i>
    <p>Touch the fingerprint sensor</p>
    <div class="fingerprint-placeholder"></div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
